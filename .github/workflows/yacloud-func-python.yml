name: Auto Deploy to TESTING YaCloud Functions

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Download Stockfish
      run: |
        wget -q http://mirror.yandex.ru/ubuntu/pool/universe/s/stockfish/stockfish_16-1build1_amd64.deb
        ar -x stockfish_16-1build1_amd64.deb
        tar -xf data.tar.xz
        cp ./usr/games/stockfish ./stockfish
        chmod +x ./stockfish
    - name: Deploy Function
      id: sls-func
      uses: yc-actions/yc-sls-function@v2
      with:
        yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        folder-id: ${{ secrets.FOLDER_ID }}
        function-name: 'alice-chess-testing'
        runtime: 'python312'
        memory: '2048Mb'
        entrypoint: 'alice_serverless.handler'
        environment: |
          CHESS_API_KEY=${{ secrets.CHESS_API_KEY }}
          DEBUG=True
          COUNT=1
        include: |
          *.py
          handlers/*.py
          request_validators/*.py
          requirements.txt
          stockfish
        exclude: |
          **/*.ts
          **/tests/**
          **/_prev-stable/**
          tests/
          _prev-stable/
          .github/**
          venv/**
          .gitignore
          LICENSE
